<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>morphic.</title>
  
  <!-- Babel Standalone for Sandbox Transpilation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js"></script>

  <!-- Google Fonts: Cormorant Garamond (Serif) & Inter (Fallback for Satoshi) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'warm-fog': '#F7F4EF', /* Lighter, fresher cream background */
            'fresh-green': '#B7D487', /* Bright lime green from image */
            'fresh-pink': '#E897B4', /* Bright bubblegum pink from image */
            'hot-pink': '#D97A9E', /* Slightly deeper pink for accents/gradients */
            'soldier-green': '#425221', /* Deep green for high contrast text */
          },
          fontFamily: {
            serif: ['"Cormorant Garamond"', 'serif'],
            sans: ['Satoshi', 'sans-serif'],
          },
          animation: {
            'fade-in': 'fadeIn 1s ease-in-out',
            'slide-up': 'slideUp 0.5s ease-out',
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #F7F4EF; /* warm-fog */
      color: #425221; /* soldier-green */
      -webkit-tap-highlight-color: transparent;
    }
    /* Hide scrollbar for horizontal scroll areas */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>

  <!-- Import Maps -->
  </head>
<body>
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
<script type="module" src="/index.js"></script></body>
</html>
